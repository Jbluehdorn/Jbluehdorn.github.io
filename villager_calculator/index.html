<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Villager Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <script src="lib/react.min.js"></script>
  <script src="lib/react-dom.min.js"></script>
  <script src="lib/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script src="villagers.js"></script>
  <script src="probability.js"></script>
  <script type="text/babel" data-type="module">
const { useState, useMemo, useRef, useCallback, useEffect } = React;
const engine = window.VillagerEngine;
const allNames = engine.getAllVillagerNames();

function loadFromStorage(key, fallback) {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch { return fallback; }
}

function VillagerSearch({ onAdd, excludeNames, placeholder, id }) {
  const [text, setText] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [active, setActive] = useState(-1);
  const normalize = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

  const handleChange = (e) => {
    const val = e.target.value;
    setText(val);
    if (!val.trim()) { setSuggestions([]); setActive(-1); return; }
    const nv = normalize(val);
    const filtered = allNames.filter(n =>
      normalize(n).startsWith(nv) && !excludeNames.some(sv => sv.toLowerCase() === n.toLowerCase())
    ).slice(0, 8);
    setSuggestions(filtered);
    setActive(filtered.length > 0 ? 0 : -1);
  };

  const submit = (name) => {
    onAdd(name);
    setText('');
    setSuggestions([]);
    setActive(-1);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(prev => Math.min(prev + 1, suggestions.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(prev => Math.max(prev - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); if (active >= 0 && suggestions[active]) submit(suggestions[active]); else if (text.trim()) submit(text.trim()); }
    else if (e.key === 'Escape') { setSuggestions([]); setActive(-1); }
  };

  return (
    <div className="search-row">
      <div className="search-wrapper">
        <input id={id} type="text" value={text} onChange={handleChange} onKeyDown={handleKeyDown} placeholder={placeholder} autoComplete="off" />
        {suggestions.length > 0 && (
          <ul className="suggestions">
            {suggestions.map((name, i) => {
              const info = engine.getVillagerInfo(name);
              return (
                <li key={name} className={i === active ? 'active' : ''} onMouseDown={() => submit(name)} onMouseEnter={() => setActive(i)}>
                  {info && info.iconImage && <img src={info.iconImage} alt="" className="suggestion-icon" />}
                  <span>{name}</span>
                  {info && <span className="species-tag">{info.species}</span>}
                </li>
              );
            })}
          </ul>
        )}
      </div>
      <button className="add-btn" onClick={() => { if (active >= 0 && suggestions[active]) submit(suggestions[active]); else if (text.trim()) submit(text.trim()); }}>Add</button>
    </div>
  );
}

function App() {
  const [islandVillagers, setIslandVillagers] = useState(() => loadFromStorage('islandVillagers', []));
  const [islandExpanded, setIslandExpanded] = useState(true);
  const [selectedVillagers, setSelectedVillagers] = useState([]);
  const [ticketCount, setTicketCount] = useState(1);
  const fileInputRef = useRef(null);

  useEffect(() => {
    localStorage.setItem('islandVillagers', JSON.stringify(islandVillagers));
  }, [islandVillagers]);

  const addIslandVillager= useCallback((name) => {
    const info = engine.getVillagerInfo(name);
    if (!info) return;
    setIslandVillagers(prev => {
      if (prev.length >= 10) return prev;
      if (prev.some(v => v.toLowerCase() === info.name.toLowerCase())) return prev;
      return [...prev, info.name];
    });
  }, []);

  const removeIslandVillager = useCallback((name) => {
    setIslandVillagers(prev => prev.filter(v => v !== name));
  }, []);

  const addVillager = useCallback((name) => {
    const info = engine.getVillagerInfo(name);
    if (!info) return;
    setSelectedVillagers(prev => {
      if (prev.some(v => v.toLowerCase() === info.name.toLowerCase())) return prev;
      return [...prev, info.name];
    });
  }, []);

  const removeVillager = useCallback((name) => {
    setSelectedVillagers(prev => prev.filter(v => v !== name));
  }, []);

  // All names that shouldn't appear in either search
  const allExcludedFromIsland = useMemo(() => [...islandVillagers], [islandVillagers]);
  const allExcludedFromWishlist = useMemo(() => [...selectedVillagers, ...islandVillagers], [selectedVillagers, islandVillagers]);

  const handleFileUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      text.split(',').map(n => n.trim()).filter(Boolean).forEach(name => addVillager(name));
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const handleTicketChange = (e) => {
    const raw = e.target.value;
    if (raw === '') { setTicketCount(''); return; }
    const val = parseInt(raw, 10);
    if (!isNaN(val) && val >= 1) setTicketCount(val);
  };

  const handleTicketBlur = () => {
    if (ticketCount === '' || ticketCount < 1) setTicketCount(1);
  };

  const results = useMemo(() => {
    if (selectedVillagers.length === 0 || ticketCount === '' || ticketCount < 1) return null;
    return engine.calculateResults(selectedVillagers, ticketCount, islandVillagers);
  }, [selectedVillagers, ticketCount, islandVillagers]);

  const formatPercent = (p) => {
    if (p >= 1) return '100%';
    if (p < 0.0001) return '<0.01%';
    return (p * 100).toFixed(2) + '%';
  };

  return (
    <div className="app">
      <h1>🏝️ Villager Calculator</h1>
      <p className="subtitle">Calculate your odds of finding your dreamies!</p>

      <div className="section-box">
        <div className="section-header" onClick={() => setIslandExpanded(prev => !prev)}>
          <span className="section-header-left">
            <span className={"collapse-arrow" + (islandExpanded ? " expanded" : "")}>▶</span>
            <label>Your Island Residents ({islandVillagers.length}/10)</label>
          </span>
        </div>
        <p className="section-hint">Your island residents won't show up on mystery islands</p>
        {islandExpanded && (
          <div className="section-body">
            <VillagerSearch onAdd={addIslandVillager} excludeNames={allExcludedFromIsland} placeholder="Add a current resident..." id="island-search" />
            {islandVillagers.length > 0 && (
              <div className="pills" style={{marginTop: '8px'}}>
                {islandVillagers.map(name => {
                  const info = engine.getVillagerInfo(name);
                  return (
                    <span key={name} className="pill island-pill" title={name}>
                      {info && info.iconImage && <img src={info.iconImage} alt={name} className="pill-icon" />}
                      <span className="pill-name">{name}</span>
                      <button className="remove-btn" onClick={() => removeIslandVillager(name)}>✕</button>
                    </span>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      <div className="input-section">
        <div className="search-container">
          <label htmlFor="villager-search">Dreamie Wishlist</label>
          <VillagerSearch onAdd={addVillager} excludeNames={allExcludedFromWishlist} placeholder="Add a dreamie..." id="villager-search" />
        </div>

        <div className="file-upload">
          <label>Upload CSV</label>
          <button className="upload-btn" onClick={() => fileInputRef.current.click()}>
            📁 Choose File
          </button>
          <input
            ref={fileInputRef}
            type="file"
            accept=".csv,.txt"
            onChange={handleFileUpload}
            style={{ display: 'none' }}
          />
        </div>
      </div>

      {selectedVillagers.length > 0 && (
        <div className="villager-list">
          <label>Dreamie Wishlist ({selectedVillagers.length})</label>
          <div className="pills">
            {selectedVillagers.map(name => {
              const info = engine.getVillagerInfo(name);
              return (
                <span key={name} className="pill" title={name}>
                  {info && info.iconImage && (
                    <img src={info.iconImage} alt={name} className="pill-icon" />
                  )}
                  <span className="pill-name">{name}</span>
                  <button className="remove-btn" onClick={() => removeVillager(name)}>✕</button>
                </span>
              );
            })}
          </div>
        </div>
      )}

      <div className="ticket-section">
        <label htmlFor="ticket-count">Number of Tickets (Attempts)</label>
        <div className="ticket-input-row">
          <button
            className="ticket-btn"
            onClick={() => setTicketCount(prev => Math.max(1, prev - 1))}
          >
            −
          </button>
          <input
            id="ticket-count"
            type="number"
            min="1"
            value={ticketCount}
            onChange={handleTicketChange}
            onBlur={handleTicketBlur}
          />
          <button
            className="ticket-btn"
            onClick={() => setTicketCount(prev => prev + 1)}
          >
            +
          </button>
        </div>
      </div>

      {results && (
        <div className="output-section">
          <h2>Results — {results.attempts} Ticket{results.attempts !== 1 ? 's' : ''}</h2>

          {results.mostLikely && (
            <div className="highlight-box most-likely">
              <span className="highlight-label">Most Likely to See</span>
              <div className="highlight-content">
                {results.mostLikely.icon && (
                  <img src={results.mostLikely.icon} alt="" className="highlight-icon" />
                )}
                <span className="highlight-name">{results.mostLikely.name}</span>
                <span className="highlight-value">{formatPercent(results.mostLikely.probabilityInAttempts)}</span>
              </div>
            </div>
          )}

          <div className="highlight-box combined">
            <span className="highlight-label">Chance of Seeing At Least One From Your List</span>
            <span className="highlight-value big">{formatPercent(results.combinedProbability)}</span>
          </div>

          <div className="individual-results">
            <h3>Individual Probabilities</h3>
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th className="hide-mobile">Villager</th>
                  <th className="hide-mobile">Species</th>
                  <th>Per Attempt</th>
                  <th>In {results.attempts} Attempt{results.attempts !== 1 ? 's' : ''}</th>
                </tr>
              </thead>
              <tbody>
                {results.individual.map(r => (
                  <tr key={r.name}>
                    <td>{r.icon && <img src={r.icon} alt={r.name} title={r.name} className="table-icon" />}</td>
                    <td className="hide-mobile">{r.name}</td>
                    <td className="hide-mobile">{r.species}</td>
                    <td>{formatPercent(r.singleProbability)}</td>
                    <td className="prob-cell">{formatPercent(r.probabilityInAttempts)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
